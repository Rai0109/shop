<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lỗi {{ code }}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
body{background:#080c14;color:#f0f0f0;font-family:'Syne',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:1rem}
.code{font-size:6rem;font-weight:800;font-family:'Space Mono',monospace;background:linear-gradient(90deg,#ff6a00,#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
</style>
</head>
<body>
<div>
  <div class="code">{{ code }}</div>
  <div style="font-size:1.2rem;font-weight:700;margin:.5rem 0">{{ msg }}</div>
  <a href="/" style="color:#ff6a00;text-decoration:none;font-size:.9rem">← Về trang chủ</a>
</div>
</body>
</html>
